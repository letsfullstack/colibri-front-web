<section class="newsletter">
    <img src="../../assets/img/news.png" alt="">
    <div class="overlay">
        <h1>Newsletter</h1>
        <p data-ng-bind-html="'NEWSLETTER_TEXT'|translate"></p>
        <form ng-submit="vm.subscribe()">
            <input type="email" ng-model="vm.email" placeholder="E-mail">
            <button type="submit">{{'NEWSLETTER_BUTTON'|translate}}</button>
        </form>
    </div>
</section>

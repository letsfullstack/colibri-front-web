<section class="blog container">
    <div class="left">
        <h1 ng-bind-html="vm.title"></h1>
        <p ng-bind-html="vm.description"></p>
    </div>
    <div class="mid">
        <div class="swiper-container">
            <div class="swiper-wrapper">
                <div class="swiper-slide product" ng-repeat="test in [0,1,2,3,4,5,6,7]">
                    <img src="https://via.placeholder.com/270" alt="">
                    <h2>
                        Título da notícia, postagem
                        ou evento do blog
                    </h2>
                </div>
            </div>
        </div>
    </div>
    <div class="right">
        <button>todos os posts ⟶</button>
    </div>
    <div class="list row">
        <div class="col-3 post" ng-repeat="test in [0,1,2,3]">
            <img src="https://via.placeholder.com/270" alt="">
            <h2>
                Título da notícia, postagem
                ou evento do blog
            </h2>
        </div>
    </div>
</section>

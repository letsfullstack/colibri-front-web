<!DOCTYPE html>
<html lang="en" ng-app="root" ng-strict-di>
<head>
  <meta charset="UTF-8">
  <base href="/">

  <title ng-bind="ngMeta.title"></title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="author" content="{{ngMeta.author}}" />
  <meta name="description" content="{{ngMeta.description}}" />

  <!-- Facebook Meta Tags -->
  <meta property="og:title" content="Finalize" />
  <meta property="og:description" content="A Movelaria Finalize é uma empresa especializada em criar móveis planejados com alto padrão de qualidade e com preço justo. A entrega no prazo e total suporte ao cliente é o nosso principal objetivo." />
  <meta property="og:image" content="https://finalize.letscomunica.com.br/img/logo_header.png" />
  <meta property="og:image:type" content="image/png">
  <meta property="og:url" content="https://finalize.letscomunica.com.br/" />
  <meta property="og:site_name" content="Finalize" />
  <meta property="og:type" content="website">

  <!-- Google / Search Engine Tags -->
  <meta itemprop="name" content="Finalize">
  <meta itemprop="description" content="A Movelaria Finalize é uma empresa especializada em criar móveis planejados com alto padrão de qualidade e com preço justo. A entrega no prazo e total suporte ao cliente é o nosso principal objetivo.">
  <meta itemprop="image" content="http://finalize.letscomunica.com.br/img/logo_header.png">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@siteBR">
  <meta name="twitter:title" content="Finalize">
  <meta name="twitter:description" content="A Movelaria Finalize é uma empresa especializada em criar móveis planejados com alto padrão de qualidade e com preço justo. A entrega no prazo e total suporte ao cliente é o nosso principal objetivo.">
  <meta name="twitter:image:src" content="http://finalize.letscomunica.com.br/img/logo_header.png">

  <link rel="canonical" href="https://localhost:4000/" />

</head>
<body>
  <root></root>
</body>
</html>

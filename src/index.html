<!DOCTYPE html>
<html lang="en" ng-app="root" ng-strict-di>
  
<head>
  <meta charset="UTF-8">
  <base href="/">

  <title ng-bind="ngMeta.title"></title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="author" content="{{ngMeta.author}}" />
  <meta name="description" content="{{ngMeta.description}}" />

  <!-- Facebook Meta Tags -->
  <meta property="og:title" content="Colibri" />
  <meta property="og:description" content="Colibri descrição" />
  <meta property="og:image" content="https://colibri.letscomunica.com.br/img/logo_header.png" />
  <meta property="og:image:type" content="image/png">
  <meta property="og:url" content="https://colibri.letscomunica.com.br/" />
  <meta property="og:site_name" content="Colibri" />
  <meta property="og:type" content="website">

  <!-- Google / Search Engine Tags -->
  <meta itemprop="name" content="Colibri">
  <meta itemprop="description" content="Colibri descrição">
  <meta itemprop="image" content="http://colibri.letscomunica.com.br/img/logo_header.png">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@siteBR">
  <meta name="twitter:title" content="Colibri">
  <meta name="twitter:description" content="Colibri descrição">
  <meta name="twitter:image:src" content="http://colibri.letscomunica.com.br/img/logo_header.png">

  <link rel="canonical" href="http://colibri.letscomunica.com.br/" />

</head>
<body style="opacity: 0; overflow: hidden;">
  <root></root>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDUTz7I0tL-Kajh1ClRLUaWMHm88jabpec" async
    defer></script>
    
</body>
</html>
